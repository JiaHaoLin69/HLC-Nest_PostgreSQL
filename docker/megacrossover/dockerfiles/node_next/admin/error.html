<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - Pokémon API</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding-top: 50px;
            background-color: #f0f0f0;
            background-image: radial-gradient(#e0e0e0 15%, transparent 16%), radial-gradient(#e0e0e0 15%, transparent 16%);
            background-size: 60px 60px;
            background-position: 0 0, 30px 30px;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
        }

        .container {
            background-color: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 90%;
            border-top: 8px solid #EF5350;
            /* Pokédex Red */
        }

        .pokeball {
            width: 80px;
            height: 80px;
            background: linear-gradient(to bottom, #EF5350 50%, white 50%);
            border-radius: 50%;
            border: 4px solid #333;
            margin: 0 auto 20px;
            position: relative;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .pokeball::before {
            content: "";
            position: absolute;
            top: calc(50% - 4px);
            left: 0;
            width: 100%;
            height: 8px;
            background-color: #333;
        }

        .pokeball::after {
            content: "";
            position: absolute;
            top: calc(50% - 12px);
            left: calc(50% - 12px);
            width: 24px;
            height: 24px;
            background-color: white;
            border-radius: 50%;
            border: 4px solid #333;
            box-sizing: border-box;
        }

        h1 {
            color: #333;
            margin-bottom: 15px;
            font-size: 28px;
        }

        p {
            color: #666;
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        a {
            text-decoration: none;
            color: white;
            background-color: #3B4CCA;
            /* Pokémon Blue */
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            display: inline-block;
            transition: background-color 0.3s, transform 0.1s;
        }

        a:hover {
            background-color: #2a3a9e;
        }

        a:active {
            transform: scale(0.98);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="pokeball"></div>
        <h1>¡Snorlax bloquea el paso!</h1>
        <p>Parece que ha ocurrido un error o la página que buscas se ha escapado entre la hierba alta. No hemos podido
            encontrarla.</p>
        <a href="/">Volver a Pueblo Paleta</a>
    </div>
</body>

</html>
